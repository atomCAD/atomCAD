[package]
name = "atomcad"
version.workspace = true
publish.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true

[workspace.package]
version = "0.1.0"
publish = false
authors = ["Elementa <hello@elementa.inc>"]
license = "MPL-2.0"
edition = "2024"

[workspace]
members = ["crates/*"]

[workspace.dependencies]
# atomCAD
app = { package = "atomcad-app", path = "crates/app" }
# Entity Component System
bevy_ecs = "0.18"
ecs = { package = "atomcad-ecs", path = "crates/ecs" }
# Input
keyboard = { package = "atomcad-keyboard", path = "crates/keyboard" }
# Logging
log = "0.4"
logging = { package = "atomcad-logging", path = "crates/logging" }
# Rust
anyhow = "1"

[dependencies]
# atomCAD
app = { workspace = true }
# Logging
log = { workspace = true }
logging = { workspace = true }

[target.'cfg(target_family = "wasm")'.dependencies]
# Pin wasm-bindgen to match the wasm-bindgen-cli version installed in CI.
# web-sys unstable APIs (needed for WebGPU) don't follow semver, and newer
# versions rename VideoFrame methods that glow 0.16.0 depends on.
wasm-bindgen = "=0.2.106"

[target.'cfg(target_family = "wasm")'.dev-dependencies]
wasm-bindgen-test = "0.3"
